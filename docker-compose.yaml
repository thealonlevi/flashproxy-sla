# Local demo of the whole closed system: its own ClickHouse + origin + website.
# `docker compose up` then open http://localhost:8080.
# For simplicity the demo uses the `sla` admin user; production uses the three
# scoped roles in schema/roles.sql. The worker needs a real proxy, so it's in the
# optional `demo` profile:
#   ISP_PROXY_URL='http://user:pass@host:30' docker compose --profile demo up
services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_DB: sla
      CLICKHOUSE_USER: sla
      CLICKHOUSE_PASSWORD: sla
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    volumes:
      - ./schema/clickhouse.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - chdata:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user sla --password sla --query 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  origin:
    build: .
    command: ["/app/origin", "-addr=:8080"]
    # bound to localhost: a demo origin should not be world-reachable.
    ports: ["127.0.0.1:8081:8080"]

  website:
    build: .
    command: ["/app/website", "-config=/app/config/website.json"]
    depends_on:
      clickhouse: { condition: service_healthy }
    environment:
      LEDGER_PUBKEY: ${LEDGER_PUBKEY:-}
    volumes:
      - ./config/website.docker.json:/app/config/website.json:ro
    ports: ["127.0.0.1:8080:8080"]

  worker:
    build: .
    command: ["/app/worker", "-config=/app/config/worker.json"]
    depends_on:
      clickhouse: { condition: service_healthy }
    environment:
      ISP_PROXY_URL: ${ISP_PROXY_URL:-}
      LEDGER_SIGNING_KEY: ${LEDGER_SIGNING_KEY:-}
    profiles: ["demo"]
    volumes:
      - ./config/worker.docker.json:/app/config/worker.json:ro

volumes:
  chdata:
